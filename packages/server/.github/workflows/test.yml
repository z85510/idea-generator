name: Tests

on:
   push:
      branches: [dev]
   pull_request:
      branches: [dev]

jobs:
   test:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4

         - name: Set up Python
           uses: actions/setup-python@v5
           with:
              python-version: '3.11'

         - name: Install dependencies
           run: pip install -r requirements.txt

         - name: Run tests
           run: python -m unittest tests.test_app -v
